version: "3.9"

services:
  db:
    image: mysql:8
    container_name: vault_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: vault
      MYSQL_USER: vaultuser
      MYSQL_PASSWORD: vaultpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: vault_backend
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: vaultuser
      DB_PASSWORD: vaultpass
      DB_NAME: vault
    ports:
      - "5001:5001"

  frontend:
    build: ./frontend
    container_name: vault_frontend
    restart: always
    depends_on:
      - backend
    environment:
      SECRET_KEY: supersecretkey
    ports:
      - "5000:5000"

volumes:
  db_data: