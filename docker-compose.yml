version: "3.9"

services:
  db:
    image: mysql:8
    container_name: vault_db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: vault_backend
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "5001:5001"

  frontend:
    build: ./frontend
    container_name: vault_frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "5000:5000"

volumes:
  db_data: